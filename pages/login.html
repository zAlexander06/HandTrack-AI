<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HandTrackLIS — Accedi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link href="../CSS/style.css" rel="stylesheet">
</head>
<body>
<div class="page active" id="page-login">
<nav class="topnav">
<a class="logo" onclick="window.location.href='../index.html'">
<div class="logo-icon"><img alt="" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'%3E%3Cpath d='M6 9V5a2 2 0 0 1 4 0v4M10 9V4a2 2 0 0 1 4 0v5M14 9V6a2 2 0 0 1 4 0v6a6 6 0 0 1-12 0V9'/%3E%3C/svg%3E"/></div>
      HandTrackLIS
    </a>
<div class="nav-right" style="margin-left:auto;">
<button class="btn btn-ghost" onclick="window.location.href='../index.html'">← Torna alla Home</button>
</div>
</nav>
<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px;background:radial-gradient(ellipse 60% 60% at 50% 0%,rgba(37,99,235,0.06) 0%,transparent 70%);">
<div style="width:100%;max-width:420px;">
<div style="text-align:center;margin-bottom:32px;">
<div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
<img alt="" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'%3E%3Cpath d='M6 9V5a2 2 0 0 1 4 0v4M10 9V4a2 2 0 0 1 4 0v5M14 9V6a2 2 0 0 1 4 0v6a6 6 0 0 1-12 0V9'/%3E%3C/svg%3E" style="width:28px;height:28px;"/>
</div>
<h2 style="font-family:'Syne',sans-serif;font-size:26px;font-weight:700;margin-bottom:6px;">Bentornato</h2>
<p class="text-muted text-sm">Accedi al tuo account HandTrackLIS</p>
</div>
<div class="card">
<div class="pill-tabs" style="margin-bottom:24px;">
<button class="pill-tab active" onclick="showTab('login-inner','signup-inner',this)">Accedi</button>
<button class="pill-tab" onclick="showTab('signup-inner','login-inner',this)">Crea Account</button>
</div>
<div id="login-inner" style="display:flex;flex-direction:column;">
<div class="flex flex-col gap-3 mb-4">
<div class="input-group"><label class="input-label">Indirizzo Email</label><input class="input" placeholder="mario.rossi@email.it" type="email"/></div>
<div class="input-group"><label class="input-label">Password</label><input class="input" placeholder="••••••••" type="password"/></div>
</div>
<span id="login-error" style="display:none;font-size:12px;color:#ef4444;margin-bottom:12px;"></span>
<div style="display:flex;justify-content:flex-end;margin-bottom:20px;"><a id="forgot-link" style="font-size:12px;color:var(--accent);cursor:pointer;">Password dimenticata?</a></div>
<button class="btn btn-primary w-full" style="justify-content:center;padding:12px;">Accedi</button>
</div>

<div id="signup-inner" style="display:none;flex-direction:column;">
<div class="flex flex-col gap-3 mb-4">
<div class="grid-2" style="gap:12px;">
<div class="input-group"><label class="input-label">Nome</label><input class="input" placeholder="Mario"/></div>
<div class="input-group"><label class="input-label">Cognome</label><input class="input" placeholder="Rossi"/></div>
</div>
<div class="input-group"><label class="input-label">Indirizzo Email</label><input id="su-email" class="input" placeholder="mario.rossi@email.it" type="email"/></div>
<div class="input-group">
  <label class="input-label">Conferma Email</label>
  <input id="su-email2" class="input" placeholder="mario.rossi@email.it" type="email"/>
  <span id="err-email" style="display:none;font-size:11px;color:#ef4444;margin-top:4px;" data-msg="Le email non coincidono">Le email non coincidono</span>
</div>
<div class="input-group"><label class="input-label">Password</label><input id="su-pass" class="input" placeholder="Minimo 8 caratteri" type="password"/></div>
<div class="input-group">
  <label class="input-label">Conferma Password</label>
  <input id="su-pass2" class="input" placeholder="Ripeti la password" type="password"/>
  <span id="err-pass" style="display:none;font-size:11px;color:#ef4444;margin-top:4px;" data-msg="Le password non coincidono">Le password non coincidono</span>
</div>
</div>
<span id="signup-error" style="display:none;font-size:12px;color:#ef4444;margin-bottom:12px;"></span>
<button class="btn btn-primary w-full" id="signup-btn" style="justify-content:center;padding:12px;">Crea Account</button>
</div>

<!-- Forgot password modal backdrop -->
<div id="forgot-modal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
  <div class="card" style="width:100%;max-width:380px;margin:24px;">
    <h3 style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px;">Recupera Password</h3>
    <p class="text-muted text-sm" style="margin-bottom:20px;">Inserisci la tua email: ti invieremo un link per reimpostare la password.</p>
    <div id="forgot-form">
      <div class="input-group" style="margin-bottom:16px;">
        <label class="input-label">Indirizzo Email</label>
        <input id="forgot-email" class="input" placeholder="mario.rossi@email.it" type="email"/>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-outline" style="flex:1;justify-content:center;" onclick="closeForgot()">Annulla</button>
        <button class="btn btn-primary" style="flex:1;justify-content:center;" id="forgot-send-btn">Invia Link</button>
      </div>
    </div>
    <div id="forgot-sent" style="display:none;text-align:center;padding:8px 0;">
      <div style="font-size:32px;margin-bottom:12px;">📧</div>
      <p style="font-weight:600;margin-bottom:6px;">Email inviata!</p>
      <p class="text-muted text-sm" style="margin-bottom:20px;">Controlla la tua casella <strong id="forgot-sent-addr"></strong> e segui le istruzioni.</p>
      <button class="btn btn-primary w-full" style="justify-content:center;" onclick="closeForgot()">Chiudi</button>
    </div>
  </div>
</div>
</div>
</div>
</div>
</div>
<script src="../JS/login.js"></script>
</body>
</html>
