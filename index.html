<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./script/style.css">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <link rel="shortcut icon" href="./imgs/icon.ico" type="image/x-icon">
    <title>Hand Tracking Web</title>
</head>

<body>

    <div class="container-camera">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="draw_canvas"></canvas>

        <div id="container-sottotitoli">
            <span id="sottotitoli-testo">In Attesa di Segni...</span>
            <div id="suggerimenti-box" class="suggerimenti-container"></div>
        </div>
    </div>

    <div class="container-controls">
        <p id="info">Caricamento modello...</p>

        <button id="recordBtn" class="btn-primary">Avvia Registrazione</button>

        <input type="file" id="folderInput" webkitdirectory multiple style="display:none">
        <label id="labelCartellaDownload" for="folderInput" class="btn-file">
            <span id="folderLabel">Scegli cartella</span>
        </label>

        <button id="trainBtn" class="btn-secondary">Allena Modello IA</button>
        <button id="clearBtn" class="btn-danger">Reset Frase</button>
    </div>

    <script type="module" src="./script/handTrack/base.js"></script>
</body>

</html>
